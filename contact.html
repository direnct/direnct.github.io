<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Direnç Tekin</title>
    <meta name="description" content="Get in touch with Direnç Tekin for collaborations and inquiries.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <header class="navbar scrolled">
        <div class="container">
            <a href="index.html" class="logo">DT<span>.</span></a>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="index.html#projects">Projects</a></li>
                    <li><a href="index.html#about">About</a></li>
                    <li><a href="index.html#skills">Skills</a></li>
                    <li><a href="contact.html" class="btn-primary">Contact</a></li>
                    <li class="nav-socials">
                        <a href="https://github.com/direnct" target="_blank" title="GitHub"><i
                                data-lucide="github"></i></a>
                        <a href="#" title="LinkedIn"><i data-lucide="linkedin"></i></a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section id="contact" class="contact section-padding">
            <div class="container">
                <div class="contact-box">
                    <div class="section-header">
                        <span class="subtitle">Connect</span>
                        <h2>Let's Build Something Together</h2>
                    </div>
                    <form class="contact-form">
                        <div class="form-group">
                            <input type="text" placeholder="Your Name" required>
                        </div>
                        <div class="form-group">
                            <input type="email" placeholder="Your Email" required>
                        </div>
                        <div class="form-group">
                            <textarea placeholder="Your Message" rows="5" required></textarea>
                        </div>
                        <button type="submit" class="btn-primary">Send Message</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2026 Direnç Tekin. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="main.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
