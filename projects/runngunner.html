    <style>
        .project-hero {
            position: relative;
            padding: 7rem 0 8rem;
            min-height: 100vh;
            border-bottom: 1px solid var(--glass-border);
            overflow: hidden;
        }

        .hero-video {
            position: absolute;
            top: 0%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -10%) scale(0.70);
            /* User manual scale preference */
            z-index: -2;
            object-fit: cover;
            object-position: center top;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(10, 10, 12, 0.5), rgba(10, 10, 12, 0.5));
            z-index: -1;
        }

        .project-details {
            padding: 5rem 0;
        }

        .project-meta {
            display: flex;
            gap: 2rem;
            margin-top: 2rem;
            color: var(--text-muted);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--accent);
            text-decoration: none;
            margin-bottom: 2rem;
            font-weight: 600;
        }

        /* Passcode Overlay Styles */
        #passcode-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0c;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .passcode-container {
            background: rgba(20, 20, 25, 0.9);
            padding: 3rem;
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 90%;
            width: 400px;
        }

        .passcode-container h2 {
            margin-bottom: 1.5rem;
            color: #ffffff;
        }

        .passcode-input {
            padding: 0.8rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid #ffffff;
            background: transparent;
            color: white;
            font-size: 1rem;
            margin-bottom: 1rem;
            width: 100%;
            outline: none;
            box-sizing: border-box;
        }

        .passcode-input:focus {
            border-color: #00ff88;
        }

        .passcode-btn {
            padding: 0.8rem 2rem;
            border-radius: 0.5rem;
            background: #ffffff;
            color: #000;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .passcode-btn:hover {
            transform: translateY(-2px);
            background: #f0f0f0;
        }

        .passcode-error {
            color: #ff4a4a;
            margin-top: 1rem;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>

            <button id="passcode-btn" class="passcode-btn">Submit</button>
            <p id="passcode-error" class="passcode-error">Incorrect passcode.</p>

    </div>

        function checkPasscode() {
            const value = document.getElementById('passcode-input').value;
            const correctPasscode = 'runngunner'; // You can change the passcode here
            
            if (value === correctPasscode) {
                try {
                    const byteStr = atob(encryptedData);
                    let decodedUri = '';
                    for (let i = 0; i < byteStr.length; i++) {
                        decodedUri += String.fromCharCode(byteStr.charCodeAt(i) ^ value.charCodeAt(i % value.length));
                    }
                    const htmlContent = decodeURIComponent(decodedUri);
                    document.getElementById('protected-content').innerHTML = htmlContent;

                    document.getElementById('passcode-overlay').style.display = 'none';
                    document.body.style.overflow = '';
                    mainContentElements.forEach(el => el.style.display = '');
                } catch (e) {
                    document.getElementById('passcode-error').style.display = 'block';
                }
            } else {
                document.getElementById('passcode-error').style.display = 'block';
            }
        }

        lucide.createIcons();
